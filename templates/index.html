<!DOCTYPE html>
<html>
<head>
    <title>LeadGen SaaS Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
        }

        .topbar {
            background: #111a2e;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
        }

        .layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #0f1a30;
            padding: 20px;
        }

        .sidebar div {
            margin: 15px 0;
            color: #9ca3af;
            cursor: pointer;
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: #111a2e;
            padding: 20px;
            border-radius: 12px;
            max-width: 700px;
        }

        input {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #0b1220;
            color: white;
        }

        button {
            padding: 12px 18px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .result {
            margin-top: 20px;
            background: #0b1220;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-wrap;
        }

        .btn-secondary {
            background: #3b82f6;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Local Lead Strategy Generator</h1>
<p>Find where your next customers are and how to reach them instantly.</p>

<div class="topbar">
    LeadGen AI Dashboard (MVP)
</div>

<div class="layout">

    <div class="sidebar">
        <div>📊 Dashboard</div>
        <div>📦 Leads</div>
        <div>📁 Export</div>
        <div>⚙ Settings</div>
    </div>

    <div class="main">

        <div class="card">

            <h2>Generate Local Leads</h2>

            <form method="POST">
                <input name="business" placeholder="Business Type" required>
                <input name="audience" placeholder="Target Location" required>
                <button type="submit">Generate</button>
            </form>

            {% if result %}
            <div class="result">
                {{ result }}
            </div>

            <a href="/download">
                <button class="btn-secondary">Download Leads</button>
            </a>
            {% endif %}

        </div>

    </div>
</div>

</body>
</html>
